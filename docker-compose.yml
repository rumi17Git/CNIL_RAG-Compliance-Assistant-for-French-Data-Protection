networks:
  rag_network:
    driver: bridge

volumes:
  qdrant_data:
  hf_cache:

services:
  qdrant:
    image: qdrant/qdrant:v1.18.1
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - rag_network
    # No healthcheck – we'll rely on service start order + retries in ingestion

  ingestion:
    build: ./ingestion_service
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    networks:
      - rag_network
    depends_on:
      qdrant:
        condition: service_started   # just wait for container start
    # Add a small startup delay (optional, but helps)
    # command: sh -c "sleep 5 && uvicorn app:app --host 0.0.0.0 --port 8001"

  generation:
    build: ./generation_service
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    networks:
      - rag_network
    depends_on:
      qdrant:
        condition: service_started